name: Build & Test SqlWebService

# ────────────────────────────────────────────────────────────────────
# Права доступа для GITHUB_TOKEN
# ────────────────────────────────────────────────────────────────────
permissions:
  contents: write       # создание релизов и загрузка артефактов
  issues: write         # управление issue (если потребуется)

# ────────────────────────────────────────────────────────────────────
# Триггеры
# ────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:          # ручной запуск из интерфейса GitHub

# ────────────────────────────────────────────────────────────────────
# Переменные окружения
# ────────────────────────────────────────────────────────────────────
env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SERVICE_PORT: 8080
  SERVICE_URL: http://localhost:8080/SqlService
  # Опция для использования Node.js 24 вместо устаревающего Node.js 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ────────────────────────────────────────────────────────────────────
# JOB 1: Build — компиляция обоих проектов
# ────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build (.NET Framework 4.7)
    runs-on: windows-latest          # .NET Framework требует Windows-раннера

    steps:
      # 1. Получаем исходники
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Настраиваем MSBuild (входит в образ windows-latest)
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # 3. Собираем Программу
      - name: Build AccountManager (Release)
        run: |
          msbuild src\AccountManager\AccountManager\AccountManager.csproj `
            /p:Configuration=Release `
            /verbosity:minimal `
            /nologo
        shell: pwsh

      # 5. Проверяем, что артефакты существуют
      - name: Verify build artifacts
        run: |
          if (-not (Test-Path "src\AccountManager\AccountManager\Artifacts\AccountManager.exe")) {
            Write-Error "AccountManager.exe not found!"
            exit 1
          }
          Write-Host "✓ Artifact present"
          Get-Item "src\AccountManager\AccountManager\Artifacts\AccountManager.exe" | Select-Object Name, Length, LastWriteTime
        shell: pwsh

      # 6. Сохраняем артефакты сервиса
      - name: Upload AccountManager artifact
        uses: actions/upload-artifact@v4
        with:
          name: AccountManager-Release
          path: src\AccountManager\AccountManager\Artifacts\

# ────────────────────────────────────────────────────────────────────
# JOB 2: Release — создаём GitHub Release с архивами при каждом пуше
# ────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: windows-latest
    needs: [ build ]
    # Запускается только при пуше в ветку (не при pull_request)
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Скачиваем ранее собранные артефакты
      - name: Download AccountManager artifact
        uses: actions/download-artifact@v4
        with:
          name: AccountManager-Release
          path: dist/AccountManager

      # Упаковываем в ZIP
      - name: Create release archives
        run: |
          Compress-Archive -Path dist\AccountManager\*     -DestinationPath dist\AccountManager-build-${{ github.run_number }}.zip
          Write-Host "✓ Archives created"
          Get-Item dist\*.zip | Select-Object Name, Length
        shell: pwsh

      # Публикуем GitHub Release
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: AccountManager build ${{ github.run_number }}
          body: |
            ## AccountManager build ${{ github.run_number }}

            ### Состав релиза
            | Архив | Описание |
            |-------|---------|
            | `AccountManager-build-${{ github.run_number }}.zip` | Менеджер записей пользователей (.NET Framework 4.7) |

            ### Быстрый старт
            1. Распакуйте `AccountManager-*.zip`, запустите `AccountManager.exe`.

            ### Требования
            - Windows 7/8/10/11 или Windows Server 2016+
            - .NET Framework 4.7 Runtime (предустановлен в Windows 10 1903+)
          files: |
            dist/AccountManager-build-${{ github.run_number }}.zip
          draft: false
          prerelease: false
